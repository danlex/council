<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root { --bg: #0d1117; --fg: #e6edf3; --dim: #7d8590; --border: #30363d; --panel: #161b22; --green: #3fb950; --yellow: #d29922; --blue: #58a6ff; --purple: #bc8cff; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); max-width: 900px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h2 { color: var(--blue); }
    .subtitle { color: var(--dim); margin-top: -0.5rem; margin-bottom: 2rem; }
    .session-list { list-style: none; padding: 0; }
    .session-list li { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.5rem; margin: 0.75rem 0; }
    .session-list li:hover { border-color: var(--blue); }
    .session-title { font-size: 1.1rem; font-weight: 600; }
    .session-meta { color: var(--dim); font-size: 0.85rem; margin-top: 0.25rem; }
    .badge { display: inline-block; background: var(--border); color: var(--fg); font-size: 0.75rem; padding: 0.1em 0.5em; border-radius: 3px; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--dim); font-size: 0.85rem; }
  </style>
</head>
<body>
  {{ content }}
  <footer>
    <p>Powered by <a href="https://github.com/danlex/council">Council of LLMs</a> — multi-agent deliberation without confirmation bias.</p>
  </footer>
</body>
</html>
